<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Carbon Design System 스타일가이드</title>
<link rel="stylesheet" href="assets/carbon-styles.min.css" />
<style>
  :root {
    --sg-aside-w: 280px;
    --sg-accent: var(--cds-button-primary, #0f62fe);
    --sg-accent-weak: #edf5ff;
    --sg-line: var(--cds-border-subtle, #e0e0e0);
    --sg-bg-soft: var(--cds-layer, #f4f4f4);
    --sg-tx-default: var(--cds-text-primary, #161616);
    --sg-tx-secondary: var(--cds-text-secondary, #525252);
    --sg-tx-tertiary: var(--cds-text-placeholder, #a8a8a8);
  }
  * { box-sizing: border-box; }
  html { font-size: 16px; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--cds-background, #fff);
    color: var(--sg-tx-default);
    font-family: 'IBM Plex Sans', -apple-system, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }
  code, pre, .mono { font-family: 'IBM Plex Mono', ui-monospace, Consolas, monospace; }

  .sg-app { display: flex; min-height: 100vh; }

  /* ───────── 사이드바 ───────── */
  .sg-aside {
    width: var(--sg-aside-w); flex: 0 0 var(--sg-aside-w);
    border-right: 1px solid var(--sg-line);
    background: var(--sg-bg-soft);
    height: 100vh; position: sticky; top: 0;
    display: flex; flex-direction: column;
  }
  .sg-brand { display: flex; align-items: baseline; gap: 8px; padding: 24px 24px 16px; text-decoration: none; color: var(--sg-tx-default); }
  .sg-brand-mark { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; color: var(--sg-accent); }
  .sg-brand-sub { font-size: 12px; font-weight: 500; color: var(--sg-tx-secondary); }
  .sg-search-wrap { padding: 0 16px 12px; }
  .sg-search {
    width: 100%; height: 38px; padding: 0 12px;
    border: 1px solid var(--cds-border-strong, #8d8d8d); border-radius: 0;
    background: var(--cds-background, #fff); font-size: 14px;
    font-family: inherit; color: var(--sg-tx-default); outline: none;
  }
  .sg-search:focus { border-color: var(--sg-accent); box-shadow: 0 0 0 2px var(--sg-accent-weak); }
  .sg-nav { flex: 1; overflow-y: auto; padding: 4px 12px 32px; }
  .sg-nav-cat { margin: 12px 8px 4px; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; color: var(--sg-tx-secondary); text-transform: uppercase; }
  .sg-link { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 4px; text-decoration: none; color: var(--sg-tx-default); font-size: 14px; font-weight: 500; }
  .sg-link:hover { background: var(--cds-layer-hover, #e8e8e8); }
  .sg-link.is-active { background: var(--sg-accent); color: #fff; }

  .sg-tree { margin-bottom: 2px; }
  .sg-tree-head { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 4px; text-decoration: none; color: var(--sg-tx-default); font-size: 14px; font-weight: 500; cursor: pointer; }
  .sg-tree-head:hover { background: var(--cds-layer-hover, #e8e8e8); }
  .sg-tree-head.is-current { background: var(--cds-layer-hover, #e8e8e8); }
  .sg-caret { display: inline-block; width: 10px; flex: none; font-size: 10px; text-align: center; opacity: .5; transition: transform .15s; }
  .sg-caret::before { content: "▸"; }
  .sg-tree.is-open > .sg-tree-head .sg-caret { transform: rotate(90deg); }
  .sg-tree-kids { display: none; padding-left: 18px; margin-top: 2px; }
  .sg-tree.is-open .sg-tree-kids { display: block; }
  .sg-sub { display: flex; align-items: center; gap: 6px; padding: 6px 12px; margin: 1px 0; border-radius: 4px; border-left: 2px solid transparent; text-decoration: none; color: var(--sg-tx-secondary); font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
  .sg-sub::before { content: ""; width: 4px; height: 4px; flex: none; border-radius: 50%; background: currentColor; opacity: .4; }
  .sg-sub:hover { background: var(--cds-layer-hover, #e8e8e8); color: var(--sg-tx-default); }
  .sg-sub.is-active { background: var(--sg-accent-weak); color: var(--sg-accent); font-weight: 500; border-left-color: var(--sg-accent); }
  .sg-badge { margin-left: auto; font-size: 10px; padding: 1px 6px; border-radius: 8px; background: #fff8e1; color: #8a3800; flex: none; }

  /* ───────── 본문 ───────── */
  .sg-main { flex: 1; min-width: 0; padding: 48px; max-width: 1100px; }
  .sg-eyebrow { margin: 0 0 8px; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; color: var(--sg-accent); text-transform: uppercase; }
  .sg-title { margin: 0 0 12px; font-size: 30px; font-weight: 600; line-height: 1.3; }
  .sg-title-en { font-size: 18px; font-weight: 400; color: var(--sg-tx-secondary); }
  .sg-summary { margin: 0 0 24px; font-size: 16px; color: var(--sg-tx-secondary); max-width: 720px; line-height: 1.5; }
  .sg-badges { margin-bottom: 32px; }
  .sg-pill { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 10px; margin-right: 6px; font-weight: 500; }
  .sg-pill.react { background: #e8f0fe; color: #0043ce; }
  .sg-pill.wc { background: #defbe6; color: #0e6027; }
  .sg-pill.preview { background: #fff8e1; color: #8a3800; }

  .sg-section { margin-top: 40px; }
  .sg-h2 { margin: 0 0 16px; font-size: 20px; font-weight: 600; line-height: 1.3; }

  /* 예시 카드: 미리보기 + 코드 */
  .sg-example { margin-bottom: 32px; border: 1px solid var(--sg-line); }
  .sg-example-head { padding: 12px 16px; background: var(--sg-bg-soft); border-bottom: 1px solid var(--sg-line); display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .sg-example-title { font-size: 13px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
  .sg-example-desc { font-size: 12px; color: var(--sg-tx-secondary); }
  .sg-preview { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; padding: 32px; background: var(--cds-background, #fff); min-height: 48px; }
  .sg-codebar { display: flex; justify-content: flex-end; align-items: center; border-top: 1px solid var(--sg-line); background: var(--cds-background, #fff); }
  .sg-standalone-link { padding: 8px 16px; border-right: 1px solid var(--sg-line); font-size: 12px; font-weight: 500; color: var(--sg-tx-secondary); text-decoration: none; }
  .sg-standalone-link:hover { color: var(--sg-accent); }
  .sg-codebtn { padding: 8px 16px; background: transparent; border: 0; font-family: inherit; font-size: 12px; font-weight: 500; color: var(--sg-tx-secondary); cursor: pointer; }
  .sg-codebtn:hover { color: var(--sg-accent); }

  .sg-codepanel { border-top: 1px solid var(--sg-line); }
  .sg-codetabs { display: flex; gap: 2px; padding: 8px 8px 0; background: #262626; }
  .sg-codetab { padding: 6px 14px; background: transparent; border: 0; border-radius: 4px 4px 0 0; font-family: inherit; font-size: 12px; font-weight: 500; color: #a8a8a8; cursor: pointer; }
  .sg-codetab:hover { color: #fff; }
  .sg-codetab.is-active { background: #161616; color: #fff; }
  .sg-codewrap { position: relative; }
  .sg-code { margin: 0; padding: 16px; border: 0; background: #161616; color: #f4f4f4; font-family: 'IBM Plex Mono', ui-monospace, Consolas, monospace; font-size: 12.5px; line-height: 1.5; overflow-x: auto; white-space: pre-wrap; word-break: break-word; }
  .sg-code[hidden] { display: none; }
  .sg-copybtn { position: absolute; top: 8px; right: 8px; background: #393939; border: 0; color: #f4f4f4; font-size: 11px; padding: 4px 10px; cursor: pointer; border-radius: 2px; }
  .sg-copybtn:hover { background: #4c4c4c; }

  .sg-empty-note { border: 1px dashed var(--cds-border-strong, #8d8d8d); padding: 1.5rem; color: var(--sg-tx-secondary); font-size: 14px; }

  /* ───────── 홈 화면 ───────── */
  .sg-home h1 { font-size: 40px; font-weight: 300; margin: 0 0 4px; }
  .sg-home p.lead { font-size: 18px; color: var(--sg-tx-secondary); max-width: 640px; }
  .sg-install-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin: 32px 0; }
  .sg-install-card { border: 1px solid var(--sg-line); padding: 16px; }
  .sg-install-card h3 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--sg-tx-secondary); }
  .sg-install-card pre { background: #161616; color: #24a148; padding: 10px 12px; overflow-x: auto; font-size: 13px; margin: 0; }
  .sg-stat-row { display: flex; gap: 32px; margin: 32px 0; flex-wrap: wrap; }
  .sg-stat { border-left: 2px solid var(--sg-accent); padding-left: 12px; }
  .sg-stat .num { font-size: 32px; font-weight: 300; line-height: 1; }
  .sg-stat .lbl { font-size: 12px; color: var(--sg-tx-secondary); text-transform: uppercase; letter-spacing: .04em; }

  /* 토스트 */
  .sg-toast { position: fixed; left: 50%; bottom: 32px; transform: translateX(-50%) translateY(20px); background: #262626; color: #fff; padding: 12px 24px; border-radius: 4px; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity .18s, transform .18s; z-index: 50; }
  .sg-toast.is-show { opacity: 1; transform: translateX(-50%) translateY(0); }

  footer.sg-footer { padding: 32px 48px; color: var(--sg-tx-secondary); font-size: 12px; border-top: 1px solid var(--sg-line); }
  a.sg-inline-link { color: var(--sg-accent); text-decoration: none; }
</style>
</head>
<body class="cds--white">

<div class="sg-app">
  <aside class="sg-aside">
    <a class="sg-brand" href="#">
      <span class="sg-brand-mark">Carbon</span>
      <span class="sg-brand-sub">Style Guide</span>
    </a>
    <div class="sg-search-wrap">
      <input id="sgNavSearch" type="search" class="sg-search" placeholder="컴포넌트 검색…" aria-label="컴포넌트 검색" autocomplete="off" />
    </div>
    <nav id="sgNav" class="sg-nav" aria-label="목록"></nav>
  </aside>

  <main id="sgMain" class="sg-main" tabindex="-1"></main>
</div>

<div id="sgToast" class="sg-toast" role="status" aria-live="polite"></div>

<script src="assets/carbon-web-components.bundle.js"></script>
<script src="assets/index-data.js"></script>
<script>
(function () {
  'use strict';

  var DATA = window.__CARBON_INDEX__;
  var families = DATA.families;
  var FLAT = {};
  families.forEach(function (f) { FLAT[f.folder] = f; });

  var categoryOrder = ['Buttons', 'Forms & inputs', 'Data display', 'Content layout', 'Navigation & shell',
    'Overlays', 'Feedback & status', 'Layout', 'Typography & content', 'Skeletons', 'AI', 'Utilities', 'Other'];
  var MENU = categoryOrder
    .map(function (cat) { return { cat: cat, items: families.filter(function (f) { return f.category === cat; }) }; })
    .filter(function (g) { return g.items.length; });

  var $nav = document.getElementById('sgNav');
  var $main = document.getElementById('sgMain');
  var $navSearch = document.getElementById('sgNavSearch');
  var $toast = document.getElementById('sgToast');
  var navFilter = '';

  function el(html) {
    var t = document.createElement('template');
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function parseHash() {
    var raw = decodeURIComponent(location.hash.replace(/^#/, ''));
    var parts = raw.split('/');
    return { id: parts[0] || '', tag: parts[1] || null };
  }
  function currentId() {
    var id = parseHash().id;
    return FLAT[id] ? id : '';
  }

  /* ───────── 토스트 / 복사 ───────── */
  var toastTimer;
  function toast(msg) {
    $toast.textContent = msg;
    $toast.classList.add('is-show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { $toast.classList.remove('is-show'); }, 1400);
  }
  function copyViaTextarea(text) {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast('복사되었습니다'); } catch (e) {}
    document.body.removeChild(ta);
  }
  function copy(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(
        function () { toast('복사되었습니다'); },
        function () { copyViaTextarea(text); } // permissions/focus can reject writeText — fall back
      );
    } else {
      copyViaTextarea(text);
    }
  }

  /* ───────── 사이드바 ───────── */
  function renderNav() {
    var q = navFilter.trim().toLowerCase();
    var active = currentId();
    var activeTag = parseHash().tag;
    $nav.innerHTML = '';
    MENU.forEach(function (g) {
      var items = g.items.filter(function (f) { return !q || f.folder.toLowerCase().indexOf(q) > -1; });
      if (!items.length) return;
      $nav.appendChild(el('<p class="sg-nav-cat">' + g.cat + '</p>'));
      items.forEach(function (f) {
        var isWcOnly = f.reactExports.length === 0 && f.tags.length > 0;
        if (!f.tags.length) {
          var cls = 'sg-link' + (f.folder === active ? ' is-active' : '');
          $nav.appendChild(el('<a class="' + cls + '" href="#' + f.folder + '"><span>' + f.folder + '</span></a>'));
          return;
        }
        var open = f.folder === active || q.length > 0;
        var tree = el('<div class="sg-tree' + (open ? ' is-open' : '') + '"></div>');
        var head = el(
          '<a class="sg-tree-head' + (f.folder === active ? ' is-current' : '') + '" href="#' + f.folder + '">' +
            '<span class="sg-caret" aria-hidden="true"></span>' +
            '<span>' + f.folder + '</span>' +
            (isWcOnly ? '<span class="sg-badge">WC only</span>' : '') +
          '</a>'
        );
        tree.appendChild(head);
        var kids = el('<div class="sg-tree-kids"></div>');
        f.tags.forEach(function (t) {
          kids.appendChild(el(
            '<a class="sg-sub' + (f.folder === active && activeTag === t.name ? ' is-active' : '') + '" href="#' + f.folder + '/' + t.name + '">' + t.name + '</a>'
          ));
        });
        tree.appendChild(kids);
        $nav.appendChild(tree);
      });
    });
  }

  /* ───────── 홈 화면 ───────── */
  var totalTags = DATA.generatedTagCount;
  var totalReactExports = families.reduce(function (n, f) { return n + f.reactExports.length; }, 0);

  function renderHome() {
    document.title = 'Carbon Design System 스타일가이드';
    $main.innerHTML =
      '<div class="sg-home">' +
        '<h1>Carbon Design System</h1>' +
        '<p class="lead">IBM의 오픈소스 디자인 시스템 Carbon을 HTML(Web Components)·React·Vue 세 가지 소스로 정리한 로컬 스타일 가이드입니다. 왼쪽에서 컴포넌트를 선택하세요.</p>' +
        '<div class="sg-stat-row">' +
          '<div class="sg-stat"><div class="num">' + families.length + '</div><div class="lbl">Component families</div></div>' +
          '<div class="sg-stat"><div class="num">' + totalTags + '</div><div class="lbl">Web Component tags</div></div>' +
          '<div class="sg-stat"><div class="num">' + totalReactExports + '</div><div class="lbl">React named exports</div></div>' +
        '</div>' +
        '<div class="sg-install-cards">' +
          '<div class="sg-install-card"><h3>React (공식)</h3><pre>npm install --save @carbon/react @carbon/styles</pre></div>' +
          '<div class="sg-install-card"><h3>Web Components (공식, HTML/Vue 공용)</h3><pre>npm install --save @carbon/web-components @carbon/styles</pre></div>' +
          '<div class="sg-install-card"><h3>Vue (커뮤니티 가이드)</h3><pre>npm install --save @carbon/web-components @carbon/styles\n# main.js\napp.config.compilerOptions.isCustomElement =\n  (tag) =&gt; tag.startsWith(\'cds-\')</pre></div>' +
        '</div>' +
        '<p style="color:var(--sg-tx-secondary); font-size:14px; max-width:640px;">' +
          '<strong>폴더 구조</strong> — <code>core/</code>는 프레임워크 없이 쓰는 순수 HTML(Web Components), ' +
          '<code>react/</code>는 <code>@carbon/react</code> 재export 래퍼, <code>vue/</code>는 Web Components를 ' +
          '감싼 얇은 Vue SFC 래퍼입니다. 세 폴더 모두 <code>node_modules</code>에 실제로 설치된 IBM 공식 패키지 ' +
          '소스를 그대로 사용하며, 재구현된 코드가 아닙니다.' +
        '</p>' +
      '</div>';
  }

  /* ───────── 컴포넌트 상세 페이지 ───────── */
  var LANG_LABEL = { html: 'HTML', react: 'React', vue: 'Vue' };

  function renderComponent(f, focusTag) {
    document.title = f.folder + ' — Carbon Style Guide';

    var badges =
      (f.reactExports.length ? '<span class="sg-pill react">React · ' + f.reactExports.length + ' export' + (f.reactExports.length > 1 ? 's' : '') + '</span>' : '') +
      (f.tags.length ? '<span class="sg-pill wc">Web Component · ' + f.tags.length + ' tag' + (f.tags.length > 1 ? 's' : '') + '</span>' : '') +
      (!f.reactExports.length && f.tags.length ? '<span class="sg-pill preview">experimental in @carbon/react</span>' : '');

    var examples = f.tags.map(function (t, i) {
      var uid = f.folder + '-' + i;
      var langs = [
        { key: 'html', src: t.demoHtml },
        { key: 'react', src: f.reactSnippet },
        { key: 'vue', src: t.vueSnippet + '\n\n// import ' + tagPascal(t.name) + ' from \'./' + t.vueFile + '\'' }
      ];
      var tabs = langs.map(function (l, li) {
        return '<button type="button" class="sg-codetab' + (li === 0 ? ' is-active' : '') + '" data-uid="' + uid + '" data-lang="' + l.key + '">' + LANG_LABEL[l.key] + '</button>';
      }).join('');
      var blocks = langs.map(function (l, li) {
        return '<pre class="sg-code" data-uid="' + uid + '" data-lang="' + l.key + '"' + (li === 0 ? '' : ' hidden') + '><code>' + escapeHtml(l.src) + '</code></pre>';
      }).join('');
      return '' +
        '<div class="sg-example" id="ex-' + encodeURIComponent(t.name) + '">' +
          '<div class="sg-example-head">' +
            '<div class="sg-example-title">&lt;' + t.name + '&gt;</div>' +
            '<div class="sg-example-desc">' + escapeHtml(t.description) + ' · attribute ' + t.attrCount + '개</div>' +
          '</div>' +
          '<div class="sg-preview">' + t.demoHtml + '</div>' +
          '<div class="sg-codebar">' +
            '<a class="sg-standalone-link" href="' + t.coreFile + '" target="_blank" rel="noopener">단독 보기 ↗</a>' +
            '<button type="button" class="sg-codebtn" data-code="' + uid + '">&lt;/&gt; 코드 보기</button>' +
          '</div>' +
          '<div class="sg-codepanel" data-code="' + uid + '" hidden>' +
            '<div class="sg-codetabs">' + tabs + '</div>' +
            '<div class="sg-codewrap">' + blocks + '<button type="button" class="sg-copybtn" data-copy-uid="' + uid + '">복사</button></div>' +
          '</div>' +
        '</div>';
    }).join('');

    $main.innerHTML =
      '<p class="sg-eyebrow">' + f.category + '</p>' +
      '<h1 class="sg-title">' + f.folder + '</h1>' +
      '<div class="sg-badges">' + badges + '</div>' +
      '<p class="sg-summary">' + escapeHtml(f.description || '') + '</p>' +
      (f.tags.length ? '<section class="sg-section"><h2 class="sg-h2">Web Component 라이브 데모</h2>' + examples + '</section>' : '') +
      '<section class="sg-section"><h2 class="sg-h2">React' +
          (f.reactStoryFile ? ' <span class="sg-pill wc" style="vertical-align:middle;">carbon-design-system/carbon 실제 Storybook 예제</span>' : '') +
        '</h2>' +
        '<div class="sg-codepanel" data-code="react-only" style="border-top:1px solid var(--sg-line)">' +
          '<div class="sg-codewrap">' +
            '<pre class="sg-code" data-uid="react-only" data-lang="react"><code>' + escapeHtml(f.reactSnippet) + '</code></pre>' +
            '<button type="button" class="sg-copybtn" data-copy-uid="react-only">복사</button>' +
          '</div>' +
          '<div class="sg-codebar" style="border-top:1px solid var(--sg-line);border-bottom:0;">' +
            (f.reactStoryFile ? '<a class="sg-standalone-link" href="' + f.reactStoryFile + '" target="_blank" rel="noopener">' + f.folder + '.stories.tsx 열기 →</a>' : '') +
            (f.reactFile ? '<a class="sg-standalone-link" href="' + f.reactFile + '" target="_blank" rel="noopener">react/components/' + f.folder + '.jsx 열기 →</a>' : '') +
          '</div>' +
        '</div>' +
      '</section>' +
      (!f.tags.length && !f.reactExports.length ? '<div class="sg-empty-note">이 항목은 React 컨텍스트/유틸리티(ErrorBoundary, FeatureFlags 등)로, 시각적 컴포넌트가 아닙니다.</div>' : '');

    // 코드 패널 토글(보기/숨기기)
    Array.prototype.forEach.call($main.querySelectorAll('.sg-codebtn'), function (btn) {
      btn.addEventListener('click', function () {
        var panel = $main.querySelector('.sg-codepanel[data-code="' + btn.dataset.code + '"]');
        var hidden = panel.hasAttribute('hidden');
        panel.toggleAttribute('hidden', !hidden);
        btn.innerHTML = hidden ? '코드 숨기기' : '&lt;/&gt; 코드 보기';
      });
    });
    // 언어 탭(HTML/React/Vue) 전환
    Array.prototype.forEach.call($main.querySelectorAll('.sg-codetab'), function (btn) {
      btn.addEventListener('click', function () {
        var uid = btn.dataset.uid, lang = btn.dataset.lang;
        Array.prototype.forEach.call($main.querySelectorAll('.sg-codetab[data-uid="' + uid + '"]'), function (b) {
          b.classList.toggle('is-active', b === btn);
        });
        Array.prototype.forEach.call($main.querySelectorAll('.sg-code[data-uid="' + uid + '"]'), function (pre) {
          pre.hidden = pre.dataset.lang !== lang;
        });
      });
    });
    // 코드 복사
    Array.prototype.forEach.call($main.querySelectorAll('.sg-copybtn'), function (btn) {
      btn.addEventListener('click', function () {
        var uid = btn.dataset.copyUid;
        var visible = $main.querySelector('.sg-code[data-uid="' + uid + '"]:not([hidden])');
        if (visible) copy(visible.textContent);
      });
    });

    if (focusTag) {
      var target = document.getElementById('ex-' + encodeURIComponent(focusTag));
      if (target) target.scrollIntoView({ block: 'start' });
    }
  }

  function tagPascal(tagName) {
    return tagName.replace(/^cds-/, '').split('-').map(function (s) { return s[0].toUpperCase() + s.slice(1); }).join('');
  }

  /* ───────── 라우팅 ───────── */
  function setActive(folder) {
    document.querySelectorAll('.sg-link, .sg-tree-head').forEach(function (a) {
      var href = a.getAttribute('href') || '';
      a.classList.toggle('is-active', href === '#' + folder);
      a.classList.toggle('is-current', href === '#' + folder);
    });
  }

  function route() {
    var parsed = parseHash();
    if (!parsed.id || !FLAT[parsed.id]) { renderHome(); renderNav(); return; }
    renderComponent(FLAT[parsed.id], parsed.tag);
    renderNav();
  }

  window.addEventListener('hashchange', route);
  route();

  $navSearch.addEventListener('input', function (e) {
    navFilter = e.target.value;
    renderNav();
  });
})();
</script>
